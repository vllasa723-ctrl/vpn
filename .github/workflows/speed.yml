on: workflow_dispatch
jobs:
  vpn:
    runs-on: ubuntu-26.04
    permissions:
      actions: write
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          TAILSCALE: ${{ secrets.TAILSCALE }}
        run: |
          CPU=$(lscpu)
          echo $CPU
          LOCATION=$(curl -s -H Metadata:true --noproxy "*" "http://169.254.169.254/metadata/instance/compute/location?api-version=2017-04-02&format=text")
          if [[ $CPU != *'AMD EPYC 9V74 80-Core Processor'* || $LOCATION != eastus ]]; then
              gh workflow run "${{ github.workflow }}" -R "${{ github.repository }}"
              exit 1
          fi
          for r in eastus eastus2 westus westus2 centralus northeurope westeurope uksouth francecentral germanywestcentral switzerlandnorth norwayeast polandcentral swedencentral italynorth japaneast japanwest koreacentral eastasia southeastasia australiaeast centralindia uaenorth israelcentral southafricanorth brazilsouth; do printf "%-25s " "$r"; LC_ALL=C curl -o /dev/null -s -w "%{time_total}\n" --max-time 3 "https://${r}.api.azureml.ms/" "https://${r}.api.azureml.ms/" | tail -n 1 | LC_ALL=C awk '{val=$1*1000; if(val>0) printf "%d ms\n", val; else print "Error/Timeout"}'; done
          openssl speed -multi $(nproc) -evp sha256
          sudo lshw -class network -short
          sudo apt-get install -y nmap
          nping --tcp-connect -p 443 -c 25 1.1.1.1
          nping --tcp-connect -p 443 -c 25 8.8.8.8
          nping --tcp-connect -p 443 -c 25 77.88.8.8
          openssl speed -multi $(nproc) -evp chacha20-poly1305
      - env:
          TS_KEY: ${{ secrets.TAILSCALE_KEY }}
        run: |
          lscpu
          curl -fsSL https://tailscale.com/install.sh | sh
          echo 'net.ipv4.ip_forward = 1' | sudo tee -a /etc/sysctl.d/99-tailscale.conf
          echo 'net.ipv6.conf.all.forwarding = 1' | sudo tee -a /etc/sysctl.d/99-tailscale.conf
          sudo sysctl -p /etc/sysctl.d/99-tailscale.conf
          NETDEV=$(ip -o route get 8.8.8.8 | cut -f 5 -d " ")
          sudo ethtool -K $NETDEV rx-udp-gro-forwarding on rx-gro-list off
          sudo tailscale up --authkey=$TAILSCALE
          sleep 5
          sudo tailscale set --exit-node=east-us
          
          wget -q https://install.speedtest.net/app/cli/ookla-speedtest-1.2.0-linux-x86_64.tgz
          tar -xzf ookla-speedtest-1.2.0-linux-x86_64.tgz
          ./speedtest --accept-license --accept-gdpr
