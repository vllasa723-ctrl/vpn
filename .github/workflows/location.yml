name: location-discovery
on:
  push:
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LOCATION=$(curl -s -H Metadata:true --noproxy "*" "http://169.254.169.254/metadata/instance/compute/location?api-version=2017-04-02&format=text")
          
          FILE="locations.txt"

          touch "$FILE"
          if [[ -n "$LOCATION" ]] && ! grep -qFx "$LOCATION" "$FILE"; then
              echo "$LOCATION" >> "$FILE"
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
              git add "$FILE"
              git commit -m "Add $LOCATION"
              git push
          fi

          gh workflow run "${{ github.workflow }}" -R "${{ github.repository }}"
