on: workflow_dispatch
jobs:
  http:
    runs-on: ubuntu-26.04
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v7
      - run: |
          git clone https://github.com/SillyTavern/SillyTavern.git
          cd SillyTavern
          ./start.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
