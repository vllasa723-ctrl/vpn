name: cpu-discovery
on:
  push:
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LOCATION=$(curl -s -H Metadata:true --noproxy "*" "http://169.254.169.254/metadata/instance/compute/location?api-version=2017-04-02&format=text")
          if [[ $LOCATION != eastus ]]; then
              gh workflow run "${{ github.workflow }}" -R "${{ github.repository }}"
              exit 1
          fi

          CPU_MODEL=$(grep -m 1 'model name' /proc/cpuinfo | cut -d ':' -f 2 | sed 's/^ *//')
          if grep -q 'avx512' /proc/cpuinfo; then
              AVX="yes"
          else
              AVX="no"
          fi

          RECORD="$CPU_MODEL $AVX"
          FILE="eastus_cpus.txt"

          touch "$FILE"
          if ! grep -qFx "$RECORD" "$FILE"; then
              echo "$RECORD" >> "$FILE"
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
              git add "$FILE"
              git commit -m "Add $RECORD"
              git push
          fi

          gh workflow run "${{ github.workflow }}" -R "${{ github.repository }}"
